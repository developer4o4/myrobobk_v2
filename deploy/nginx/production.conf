# ─── Rate limiting ────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/h;
limit_req_zone $binary_remote_addr zone=submit:10m rate=30r/h;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name api.myrobo.uz myrobo.uz;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: API ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.myrobo.uz;

    ssl_certificate     /etc/letsencrypt/live/api.myrobo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.myrobo.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security headers ─────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 512;
    gzip_proxied any;

    client_max_body_size 20M;

    # ─── Static ───────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Auth (OTP login) — qat'iy rate limit ─────────────────────────
    location /user/auth/login/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://web:7712;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Code submit ──────────────────────────────────────────────────
    location ~ ^/courses/topics/.+/submit/$ {
        limit_req zone=submit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://web:7712;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Umumiy API ───────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://web:7712;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
